
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/favicon.png">

    <title>Home-Base - Your Home. Your Team.</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HomeBase">
    <meta name="mobile-web-app-capable" content="yes">

    <meta property="og:title" content="Home-Base">
    <meta property="og:description" content="Your Home. Your Team.">
    <meta property="og:image" content="https://home-base.app/thumbnail.jpg">
    <meta property="og:url" content="https://home-base.app">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark') {
          document.documentElement.classList.add('dark');
        }

        var _ce = console.error;
        console.error = function() {
          if (arguments.length === 1 && arguments[0] && typeof arguments[0] === 'object' && !(arguments[0] instanceof Error) && Object.keys(arguments[0]).length === 0) {
            return;
          }
          return _ce.apply(console, arguments);
        };

        window.onerror = function(msg, src, line, col, err) {
          if (!err || (typeof err === 'object' && !(err instanceof Error))) return true;
          if (typeof msg === 'string' && msg.indexOf('not an error object') !== -1) return true;
          return false;
        };

        window.addEventListener('error', function(e) {
          if (!e.error || (typeof e.error === 'object' && !(e.error instanceof Error))) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
        }, true);

        window.addEventListener('unhandledrejection', function(e) {
          var r = e.reason;
          if (!r || (typeof r === 'object' && !(r instanceof Error) && Object.keys(r).length === 0)) {
            e.preventDefault();
          }
        }, true);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
